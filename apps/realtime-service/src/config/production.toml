# Production configuration for realtime-service

[server]
port = 3002
environment = "production"
max_connections = 100000
max_connections_per_ip = 100
connection_timeout_secs = 30

[database]
url = "${DATABASE_URL}"
max_connections = 20
min_connections = 5
connect_timeout_secs = 10
idle_timeout_secs = 300
max_lifetime_secs = 1800

[redis]
url = "${REDIS_URL}"
max_connections = 20
connection_timeout_secs = 10
default_ttl_secs = 3600

[websocket]
max_message_size = 1048576  # 1MB
ping_interval_secs = 30
pong_timeout_secs = 10
compression_enabled = true

[rate_limiting]
enabled = true
messages_per_second = 100
connections_per_minute = 60
# Distributed rate limiting با Redis
requests_per_minute_per_ip = 100
requests_per_minute_per_user = 500
requests_per_minute_global = 10000

[presence]
heartbeat_interval_secs = 60
timeout_secs = 120
# Cleanup stale presence every 5 minutes
cleanup_interval_secs = 300

[authentication]
# JWT keys از rhelma-auth
jwt_private_key = "${JWT_PRIVATE_KEY}"
jwt_public_key = "${JWT_PUBLIC_KEY}"
jwt_expiry_secs = 3600
session_expiry_secs = 86400
refresh_token_expiry_secs = 2592000
password_hash_cost = 12

[tracing]
service_name = "realtime-service"
environment = "production"
# HTTP-based OTLP exporter
otlp_endpoint = "${OTLP_ENDPOINT:-http://localhost:4318}"
otlp_timeout_secs = 5
# Logging
console_enabled = false
json_enabled = true
log_level = "info"
# Metrics
metrics_enabled = true
prometheus_port = 9090

[rooms]
# Room configuration
default_room = "general"
max_room_size = 1000
# Automatically create rooms
auto_create = true
# Room cleanup
inactive_cleanup_secs = 3600







