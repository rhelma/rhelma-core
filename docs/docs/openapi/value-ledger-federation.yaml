openapi: 3.0.3
info:
  title: value-ledger-federation
  version: 6.0.0
  description: Rhelma Value Ledger Federation (replicated signed transactions + governance).
servers:
  - url: http://localhost:8202
tags:
  - name: public
  - name: internal
paths:
  /healthz:
    get:
      tags: [public]
      summary: Liveness probe
      responses:
        '200': { description: OK }
  /metrics:
    get:
      tags: [public]
      summary: Prometheus scrape endpoint
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema: { type: string }
  /v1/credits/{subject_id}:
    get:
      tags: [public]
      summary: Get subject credits view (federated)
      parameters:
        - in: path
          name: subject_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CreditsResponse' }
  /v1/federation/snapshot:
    get:
      tags: [public]
      summary: Pull snapshot since cursor
      parameters:
        - in: query
          name: since
          required: false
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Snapshot' }
  /v1/federation/push:
    post:
      tags: [public]
      summary: Push snapshot (replication)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Snapshot' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PushResult' }
  /v1/policy/hold/{subject_id}:
    get:
      tags: [public]
      summary: Get deposit/policy hold state
      parameters:
        - in: path
          name: subject_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LedgerPolicyHoldStateResp' }
  /v1/policy/bridge-drivers:
    get:
      tags: [public]
      summary: Get current bridge driver policy head (append-only)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BridgeDriverPolicyResp' }
  /v1/policy/bridge-drivers/history:
    get:
      tags: [public]
      summary: Get bridge driver policy history
      parameters:
        - in: query
          name: limit
          required: false
          schema: { type: integer, minimum: 1, maximum: 200 }
      responses:
        '200': { description: OK }
  /v1/receipts/verify:
    post:
      tags: [public]
      summary: Verify receipt against signer set quorum
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/VerifyReceiptReq' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/VerifyReceiptResp' }

  /v1/admin/tx:
    post:
      tags: [internal]
      summary: Admin issue signed transaction
      security:
        - internalAdmin: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminIssueTxReq' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SignedTx' }

  /v1/admin/policy/hold:
    post:
      tags: [internal]
      summary: Admin set/clear policy hold via signed transaction
      security:
        - internalAdmin: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AdminPolicyHoldReq' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SignedTx' }

  /v1/gov/proposals:
    post:
      tags: [internal]
      summary: Create governance proposal
      security:
        - internalAdmin: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GovProposalCreate' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GovProposalView' }

  /v1/gov/proposals/{id}/sign:
    post:
      tags: [internal]
      summary: Sign governance proposal
      security:
        - internalAdmin: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/GovProposalSign' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GovProposalView' }

  /v1/gov/proposals/{id}/commit:
    post:
      tags: [internal]
      summary: Commit governance proposal (requires quorum)
      security:
        - internalAdmin: []
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/GovProposalView' }

components:
  securitySchemes:
    internalAdmin:
      type: apiKey
      in: header
      name: x-admin-token
  schemas:
    CreditsResponse:
      type: object
      required: [subject_id, balance, tx_count]
      properties:
        subject_id: { type: string }
        balance: { type: integer, format: int64 }
        tx_count: { type: integer }
    Snapshot:
      type: object
      required: [cursor, txs]
      properties:
        cursor: { type: string }
        txs:
          type: array
          items: { $ref: '#/components/schemas/SignedTx' }
    SignedTx:
      type: object
      required: [tx_id, issuer_peer_id, issued_at_unix, subject_id, delta, reason, tags, signer_pubkey_hex, sig_b64]
      properties:
        tx_id: { type: string }
        issuer_peer_id: { type: string }
        issued_at_unix: { type: integer, format: int64 }
        subject_id: { type: string }
        delta: { type: integer, format: int64 }
        reason: { type: string }
        tags: { type: array, items: { type: string } }
        signer_pubkey_hex: { type: string }
        sig_b64: { type: string }
    PushResult:
      type: object
      required: [accepted, rejected]
      properties:
        accepted: { type: integer }
        rejected: { type: integer }
    HoldEntry:
      type: object
      required: [hold_id, active, last_issued_at_unix]
      properties:
        hold_id: { type: string }
        active: { type: boolean }
        reason: { type: string, nullable: true }
        until_unix: { type: integer, format: int64, nullable: true }
        ref_id: { type: string, nullable: true }
        last_tx_id: { type: string, nullable: true }
        last_issued_at_unix: { type: integer, format: int64 }
    LedgerPolicyHoldStateResp:
      type: object
      required: [subject_id, held, active_hold_ids, entries]
      properties:
        subject_id: { type: string }
        held: { type: boolean }
        active_hold_ids: { type: array, items: { type: string } }
        entries: { type: array, items: { $ref: '#/components/schemas/HoldEntry' } }
    BridgeDriverPolicyResp:
      type: object
      required: [rollback_window_sec]
      properties:
        head:
          description: Current policy head. Shape is versioned and may evolve.
          type: object
          nullable: true
          additionalProperties: true
        rollback_window_sec: { type: integer, format: int64 }
    ReceiptSignature:
      type: object
      required: [signer_pubkey_hex, sig_b64]
      properties:
        signer_pubkey_hex: { type: string }
        sig_b64: { type: string }
    SignedReceipt:
      type: object
      required: [receipt_id, subject_id, amount, issued_at_unix, purpose, tx_refs, signatures]
      properties:
        receipt_id: { type: string }
        subject_id: { type: string }
        amount: { type: integer, format: int64 }
        issued_at_unix: { type: integer, format: int64 }
        purpose: { type: string }
        tx_refs: { type: array, items: { type: string } }
        signatures: { type: array, items: { $ref: '#/components/schemas/ReceiptSignature' } }
    VerifyReceiptReq:
      type: object
      required: [receipt]
      properties:
        receipt: { $ref: '#/components/schemas/SignedReceipt' }
    VerifyReceiptResp:
      type: object
      required: [ok, required_quorum, valid_sigs]
      properties:
        ok: { type: boolean }
        required_quorum: { type: integer }
        valid_sigs: { type: integer }
    AdminIssueTxReq:
      type: object
      required: [subject_id, delta, reason]
      properties:
        subject_id: { type: string }
        delta: { type: integer, format: int64 }
        reason: { type: string }
        tags:
          type: array
          nullable: true
          items: { type: string }
    AdminPolicyHoldReq:
      type: object
      required: [subject_id, action, hold_id, reason]
      properties:
        subject_id: { type: string }
        action: { type: string, enum: [set, clear] }
        hold_id: { type: string }
        reason: { type: string }
        until_unix: { type: integer, format: int64, nullable: true }
        ref_id: { type: string, nullable: true }
    GovProposalCreate:
      type: object
      required: [kind, payload]
      properties:
        kind: { type: string }
        payload:
          type: object
          additionalProperties: true
    GovProposalSign:
      type: object
      required: [signer_pubkey_hex, sig_b64]
      properties:
        signer_pubkey_hex: { type: string }
        sig_b64: { type: string }
    GovProposalView:
      type: object
      required: [id, kind, payload, required_quorum, valid_signatures, committed]
      properties:
        id: { type: string }
        kind: { type: string }
        payload:
          type: object
          additionalProperties: true
        required_quorum: { type: integer }
        valid_signatures: { type: integer }
        committed: { type: boolean }
