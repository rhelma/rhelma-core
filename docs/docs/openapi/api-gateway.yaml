openapi: 3.0.3
info:
  title: api-gateway
  version: 6.0.0
  description: |
    Rhelma API Gateway (HTTP edge).

    This OpenAPI describes the public/ops surfaces relevant to multi-region routing.
    Contract version: v6.0
servers:
  - url: http://localhost
x-rhelma-service: api-gateway
x-rhelma-contract-version: v6.0
tags:
  - name: Health
    description: Liveness/readiness and region routing health endpoints
  - name: Admin
    description: Admin-only operational endpoints (requires bearer auth)
paths:
  /healthz:
    get:
      summary: Health check
      tags: [Health]
      x-rhelma-internal: true
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
              example: ok
  /health/:
    get:
      summary: Liveness probe
      tags: [Health]
      x-rhelma-internal: true
      responses:
        '200':
          description: Liveness status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /health/ready:
    get:
      summary: Readiness probe
      tags: [Health]
      x-rhelma-internal: true
      responses:
        '200':
          description: Readiness status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReadyResponse'
  /health/region/{region_id}:
    get:
      summary: Region routing snapshot for a single region
      tags: [Health]
      x-rhelma-internal: true
      parameters:
        - in: path
          name: region_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Region health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegionHealthResponse'
        '404':
          description: Unknown region
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Region routing not enabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /metrics:
    get:
      summary: Prometheus metrics
      tags: [Health]
      x-rhelma-internal: true
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
  /admin/region-routing/snapshot:
    get:
      summary: Router snapshot (regions + active overrides)
      tags: [Admin]
      x-rhelma-internal: true
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegionRoutingSnapshotResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/region-routing/override:
    get:
      summary: Active override (if any) for a single upstream
      tags: [Admin]
      x-rhelma-internal: true
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: upstream
          required: true
          schema:
            type: string
          description: Upstream service name (e.g. search-service)
      responses:
        '200':
          description: Override
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegionRoutingOverrideResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /admin/region-routing/simulate-failover:
    post:
      summary: Simulate a failover override (admin)
      description: |
        Applies a best-effort in-memory override for `upstream_service`.
        Intended for staging/drills; does not require Kafka.
      tags: [Admin]
      x-rhelma-internal: true
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SimulateFailoverRequest'
      responses:
        '200':
          description: Applied override
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SimulateFailoverResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    HealthResponse:
      type: object
      required: [status, timestamp, version, environment, service]
      properties:
        status:
          type: string
          example: ok
        timestamp:
          type: string
          format: date-time
          example: '2026-01-06T12:00:00Z'
        version:
          type: string
          example: 1.0.0
        environment:
          type: string
          example: prod
        service:
          type: string
          example: api-gateway
    ReadyResponse:
      type: object
      required: [status, database, redis, uptime_seconds]
      properties:
        status:
          type: string
          example: ok
        database:
          type: boolean
          example: true
        redis:
          type: boolean
          example: true
        uptime_seconds:
          type: integer
          format: int64
          example: 42
    RegionHealthResponse:
      type: object
      required: [region_id, is_healthy, latency_ms, priority, endpoints]
      properties:
        region_id:
          type: string
          example: eu-central-1
        is_healthy:
          type: boolean
          example: true
        latency_ms:
          type: integer
          format: int32
          example: 42
        priority:
          type: integer
          format: int32
          example: 0
        endpoints:
          type: array
          items:
            type: string
          example: ['http://eu1.example:8080']
    RegionRoutingRegion:
      type: object
      required: [region_id, priority, is_healthy, latency_ms, endpoints]
      properties:
        region_id:
          type: string
          example: eu-central-1
        priority:
          type: integer
          format: int32
          example: 0
        is_healthy:
          type: boolean
          example: true
        latency_ms:
          type: integer
          format: int32
          example: 42
        endpoints:
          type: array
          items:
            type: string
          example: ['http://eu1.example:8080']
    FailoverOverride:
      type: object
      required: [upstream_service, from_region, to_region, reason, observed_at_ms, expires_at_ms]
      properties:
        upstream_service:
          type: string
          example: search-service
        from_region:
          type: string
          example: us-east-1
        to_region:
          type: string
          example: eu-central-1
        reason:
          type: string
          example: admin_simulation
        observed_at_ms:
          type: integer
          format: int64
          example: 1736160000000
        expires_at_ms:
          type: integer
          format: int64
          example: 1736160300000
    RegionRoutingSnapshotResponse:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
          example: true
        regions:
          type: array
          items:
            $ref: '#/components/schemas/RegionRoutingRegion'
        overrides:
          type: array
          items:
            $ref: '#/components/schemas/FailoverOverride'
    RegionRoutingOverrideResponse:
      type: object
      required: [enabled]
      properties:
        enabled:
          type: boolean
          example: true
        override:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/FailoverOverride'
    SimulateFailoverRequest:
      type: object
      required: [upstream_service, from_region, to_region]
      properties:
        upstream_service:
          type: string
          example: search-service
        from_region:
          type: string
          example: us-east-1
        to_region:
          type: string
          example: eu-central-1
        reason:
          type: string
          nullable: true
          example: admin_simulation
    SimulateFailoverResponse:
      type: object
      required: [enabled, applied]
      properties:
        enabled:
          type: boolean
          example: true
        applied:
          type: boolean
          example: true
        override:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/FailoverOverride'
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: authentication required
