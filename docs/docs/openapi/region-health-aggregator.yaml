openapi: 3.0.3
info:
  title: region-health-aggregator
  version: 6.0.0
  description: |
    Aggregates multi-region health probes and provides routing hints.

    Contract version: v6.0
servers:
  - url: http://localhost:8097
x-rhelma-service: region-health-aggregator
x-rhelma-contract-version: v6.0
tags:
  - name: Ops
    description: Health and routing hint endpoints
paths:
  /healthz:
    get:
      summary: Health check
      tags:
        - Ops
      x-rhelma-internal: true
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema:
                type: string
              example: ok
  /v1/regions/health:
    get:
      summary: Current health view of all configured regions
      tags:
        - Ops
      x-rhelma-internal: true
      responses:
        '200':
          description: Region health snapshot
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSnapshot'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /v1/route:
    get:
      summary: Route decision for a residency policy
      description: |
        Returns the current routing decision based on observed region health.

        `residency` accepts: global | regional_preferred | regional_strict
      tags:
        - Ops
      x-rhelma-internal: true
      parameters:
        - in: query
          name: residency
          schema:
            type: string
            enum: [global, regional_preferred, regional_strict]
          required: false
          description: Residency policy hint (default: global).
        - in: query
          name: requested_region
          schema:
            type: string
          required: false
          description: Optional requested region id.
      responses:
        '200':
          description: Route decision
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RouteResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    RegionHealthSummary:
      type: object
      required: [region_id, is_healthy, healthy_endpoints, latency_ms, checked_at]
      properties:
        region_id:
          type: string
          example: eu-central-1
        is_healthy:
          type: boolean
          example: true
        healthy_endpoints:
          type: integer
          format: int32
          minimum: 0
          maximum: 255
          example: 1
        latency_ms:
          type: integer
          format: int32
          minimum: 0
          example: 42
        checked_at:
          type: string
          format: date-time
          example: '2026-01-06T12:00:00Z'
    HealthSnapshot:
      type: object
      required: [observed_region, generated_at, regions]
      properties:
        observed_region:
          type: string
          example: eu-central-1
        generated_at:
          type: string
          format: date-time
          example: '2026-01-06T12:00:00Z'
        regions:
          type: array
          items:
            $ref: '#/components/schemas/RegionHealthSummary'
    RouteResponse:
      type: object
      required: [residency, selected_region, endpoints, priority, is_healthy, latency_ms]
      properties:
        residency:
          type: string
          example: Global
        requested_region:
          type: string
          nullable: true
          example: null
        selected_region:
          type: string
          example: eu-central-1
        endpoints:
          type: array
          items:
            type: string
          example: ['http://eu1.example:8080']
        priority:
          type: integer
          format: int32
          minimum: 0
          maximum: 255
          example: 0
        is_healthy:
          type: boolean
          example: true
        latency_ms:
          type: integer
          format: int32
          minimum: 0
          example: 42
    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: string
          example: invalid residency: foo (use global|regional_preferred|regional_strict)
