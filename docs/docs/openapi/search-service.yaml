openapi: 3.0.3
info:
  title: search-service
  version: 6.0.0
  description: Rhelma Search Service (hybrid + enhanced).
servers:
  - url: http://localhost:8210
tags:
  - name: public
  - name: admin
paths:
  /metrics:
    get:
      tags: [admin]
      summary: Prometheus scrape endpoint
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema: { type: string }

  /search:
    post:
      tags: [public]
      summary: Basic search
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SearchRequest' }
            examples:
              basic:
                value: { $ref: './examples/search_service_search_request.json' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SearchResponse' }
              examples:
                basic:
                  value: { $ref: './examples/search_service_search_response.json' }
        '400': { description: Bad Request }
        '502': { description: Dependency Failure }

  /search/enhanced:
    post:
      tags: [public]
      summary: Enhanced search (query-understanding + reranking)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EnhancedSearchRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SearchResponse' }
        '400': { description: Bad Request }
        '502': { description: Dependency Failure }

  /admin/health:
    get:
      tags: [admin]
      summary: Service health summary
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminHealthResponse' }
              examples:
                ok:
                  value: { $ref: './examples/search_service_admin_health.json' }

  /admin/info:
    get:
      tags: [admin]
      summary: Service info (environment/model)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AdminInfoResponse' }

components:
  schemas:
    SearchRequest:
      type: object
      required: [query]
      properties:
        query: { type: string }
        limit: { type: integer, minimum: 1, maximum: 100 }
        filters:
          description: Free-form filters object (low-cardinality keys only).
          type: object
          additionalProperties: true

    EnhancedSearchRequest:
      allOf:
        - $ref: '#/components/schemas/SearchRequest'
        - type: object
          properties:
            rerank:
              type: boolean
              default: true

    SearchHit:
      type: object
      required: [id, score]
      properties:
        id: { type: string }
        score: { type: number, format: float }
        title: { type: string }
        snippet: { type: string }
        meta:
          type: object
          additionalProperties: true

    SearchResponse:
      type: object
      required: [total, hits]
      properties:
        total: { type: integer, format: int64 }
        hits:
          type: array
          items: { $ref: '#/components/schemas/SearchHit' }

    AdminHealthResponse:
      type: object
      required: [service, region, overall]
      properties:
        service: { type: string }
        region: { type: string }
        overall: { type: string }

    AdminInfoResponse:
      type: object
      required: [service, environment, region, model]
      properties:
        service: { type: string }
        environment: { type: string }
        region: { type: string }
        model: { type: string }
