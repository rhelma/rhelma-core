openapi: 3.0.3
info:
  title: control-service
  version: 0.1.0
  description: |
    OpenAPI scaffold for control-service (Rhelma control-plane).

    This service is the source of truth for:
    - realms
    - nodes
    - realm → service routes

    `api-gateway` uses `GET /v1/discovery` for upstream resolution.
servers:
  - url: http://localhost
x-rhelma-service: control-service
paths:
  /health:
    get:
      summary: Health check (liveness)
      x-rhelma-internal: true
      responses:
        '200':
          description: OK
  /healthz:
    get:
      summary: Health check alias
      x-rhelma-internal: true
      responses:
        '200':
          description: OK
  /readyz:
    get:
      summary: Readiness (checks DB)
      x-rhelma-internal: true
      responses:
        '200':
          description: Ready
        '503':
          description: Not ready
  /metrics:
    get:
      summary: Prometheus metrics
      x-rhelma-internal: true
      responses:
        '200':
          description: OK

  /v1/realms:
    get:
      summary: List realms
      description: Requires `x-control-admin-token`.
      x-rhelma-internal: true
      responses:
        '200':
          description: OK
        '403':
          description: Forbidden
    post:
      summary: Create realm
      description: Requires `x-control-admin-token`.
      x-rhelma-internal: true
      responses:
        '200':
          description: OK
        '403':
          description: Forbidden

  /v1/realms/{slug}:
    patch:
      summary: Patch realm
      description: Requires `x-control-admin-token`.
      x-rhelma-internal: true
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
        '403':
          description: Forbidden

  /v1/realms/{slug}/routes:
    get:
      summary: Get realm routes
      description: Requires `x-control-admin-token`.
      x-rhelma-internal: true
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
        '403':
          description: Forbidden
    put:
      summary: Replace realm routes
      description: Requires `x-control-admin-token`.
      x-rhelma-internal: true
      parameters:
        - in: path
          name: slug
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
        '403':
          description: Forbidden

  /v1/nodes/register:
    post:
      summary: Register node
      description: Requires `x-control-node-registration-token`.
      x-rhelma-internal: true
      responses:
        '200':
          description: OK
        '403':
          description: Forbidden

  /v1/nodes/{node_id}/heartbeat:
    post:
      summary: Node heartbeat
      x-rhelma-internal: true
      parameters:
        - in: path
          name: node_id
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK

  /v1/discovery:
    get:
      summary: Service discovery for a realm
      description: |
        Returns a map of `service -> base_url` for the realm.
        Used by api-gateway.
      x-rhelma-internal: true
      parameters:
        - in: query
          name: realm
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
        '400':
          description: Bad request
components: {}
