openapi: 3.0.3
info:
  title: value-ledger
  version: 6.0.0
  description: Rhelma Value Ledger (credits + signed receipts).
servers:
  - url: http://localhost:8201
tags:
  - name: public
  - name: internal
paths:
  /healthz:
    get:
      tags: [public]
      summary: Liveness probe
      responses:
        '200': { description: OK }
  /readyz:
    get:
      tags: [public]
      summary: Readiness probe
      responses:
        '200': { description: OK }
  /metrics:
    get:
      tags: [public]
      summary: Prometheus scrape endpoint
      responses:
        '200':
          description: OK
          content:
            text/plain:
              schema: { type: string }
  /v1/credits/{subject_id}:
    get:
      tags: [public]
      summary: Get subject balance
      parameters:
        - in: path
          name: subject_id
          required: true
          schema: { type: string }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BalanceView' }
              examples:
                example:
                  value:
                    subject_id: did:rhelma:node:example123
                    balance: 4200
                    updated_at: "2026-01-07T12:34:56Z"
  /v1/receipts/verify:
    post:
      tags: [public]
      summary: Verify signed receipt
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReceiptVerifyRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ReceiptVerifyResponse' }
  /v1/credits/earn:
    post:
      tags: [internal]
      summary: Earn credits (admin/internal)
      security:
        - internalAdmin: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/EarnRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BalanceView' }
  /v1/credits/spend:
    post:
      tags: [internal]
      summary: Spend credits (admin/internal)
      security:
        - internalAdmin: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SpendRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/BalanceView' }
  /v1/receipts/issue:
    post:
      tags: [internal]
      summary: Issue a signed receipt (admin/internal)
      security:
        - internalAdmin: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ReceiptIssueRequest' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/SignedReceipt' }

components:
  securitySchemes:
    internalAdmin:
      type: apiKey
      in: header
      name: x-admin-token
  schemas:
    BalanceView:
      type: object
      required: [subject_id, balance, updated_at]
      properties:
        subject_id: { type: string }
        balance: { type: integer, format: int64 }
        updated_at: { type: string, format: date-time }
    EarnRequest:
      type: object
      required: [subject_id, amount, reason]
      properties:
        subject_id: { type: string }
        amount: { type: integer, format: int64, minimum: 1 }
        reason: { type: string }
        reference: { type: string, nullable: true }
    SpendRequest:
      type: object
      required: [subject_id, amount, reason]
      properties:
        subject_id: { type: string }
        amount: { type: integer, format: int64, minimum: 1 }
        reason: { type: string }
        reference: { type: string, nullable: true }
    ReceiptIssueRequest:
      type: object
      required: [subject_id, amount, purpose]
      properties:
        subject_id: { type: string }
        amount: { type: integer, format: int64, minimum: 1 }
        purpose: { type: string }
        external_ref: { type: string, nullable: true }
    ReceiptVerifyRequest:
      type: object
      required: [receipt]
      properties:
        receipt: { $ref: '#/components/schemas/SignedReceipt' }
    ReceiptVerifyResponse:
      type: object
      required: [valid]
      properties:
        valid: { type: boolean }
    SignedReceipt:
      type: object
      required:
        [receipt_id, subject_id, amount, purpose, issued_at, signature_b64, signer_pubkey_b64]
      properties:
        receipt_id: { type: string, format: uuid }
        subject_id: { type: string }
        amount: { type: integer, format: int64 }
        purpose: { type: string }
        issued_at: { type: string, format: date-time }
        external_ref: { type: string, nullable: true }
        signature_b64: { type: string, description: base64 signature over canonical JSON bytes }
        signer_pubkey_b64: { type: string, description: base64 public key (32 bytes) }
